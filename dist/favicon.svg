<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Tech-Horizon">
  <defs>
    <linearGradient id="th-bg" x1="0" y1="0" x2="32" y2="32">
      <stop stop-color="#0a0a0a"/>
      <stop offset="0.55" stop-color="#171717"/>
      <stop offset="1" stop-color="#262626"/>
    </linearGradient>
    <linearGradient id="th-screen" x1="7.5" y1="10" x2="24.5" y2="21.5">
      <stop stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#262626"/>
    </linearGradient>
    <linearGradient id="th-accent" x1="18" y1="13" x2="26" y2="19">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#th-bg)"/>
  <!-- stage lights -->
  <circle cx="9.5" cy="7" r="1.35" fill="#525252"/>
  <circle cx="16" cy="5.8" r="1.55" fill="#737373"/>
  <circle cx="22.5" cy="7" r="1.35" fill="#525252"/>
  <!-- keynote screen -->
  <rect
    x="7.5"
    y="10"
    width="17"
    height="11.5"
    rx="2"
    fill="url(#th-screen)"
    stroke="#404040"
    stroke-width="0.9"
  />
  <!-- agenda lines -->
  <path
    d="M10.5 14h4.8M10.5 16.5h6.5M10.5 19h3.8"
    fill="none"
    stroke="#a3a3a3"
    stroke-width="0.95"
    stroke-linecap="round"
    opacity="0.55"
  />
  <!-- insight curve -->
  <path
    d="M18.2 18.5l1.6-3.2 2.4 1.8 2.8-4.6"
    fill="none"
    stroke="url(#th-accent)"
    stroke-width="1.3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- podium -->
  <rect x="13" y="22.2" width="6" height="2" rx="0.5" fill="#404040"/>
</svg>
