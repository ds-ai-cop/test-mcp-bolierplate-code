<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Tech-Horizon">
  <defs>
    <linearGradient id="th-sky" x1="0" y1="0" x2="32" y2="32">
      <stop stop-color="#f0fdfa"/>
      <stop offset="0.5" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="th-screen" x1="8" y1="11" x2="24" y2="21">
      <stop stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#f0f9ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="th-accent" x1="18" y1="13" x2="26" y2="19">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#th-sky)"/>
  <!-- venue / stage lights -->
  <circle cx="9.5" cy="7" r="1.35" fill="#38bdf8" opacity="0.8"/>
  <circle cx="16" cy="5.8" r="1.55" fill="#22d3ee"/>
  <circle cx="22.5" cy="7" r="1.35" fill="#38bdf8" opacity="0.8"/>
  <!-- keynote screen -->
  <rect x="7.5" y="10" width="17" height="11.5" rx="2" fill="url(#th-screen)" stroke="#7dd3fc" stroke-width="0.85"/>
  <!-- session bullets (agenda) -->
  <path
    d="M10.5 14h4.8M10.5 16.5h6.5M10.5 19h3.8"
    fill="none"
    stroke="#94a3b8"
    stroke-width="0.95"
    stroke-linecap="round"
    opacity="0.5"
  />
  <!-- tech insight curve on deck -->
  <path
    d="M18.2 18.5l1.6-3.2 2.4 1.8 2.8-4.6"
    fill="none"
    stroke="url(#th-accent)"
    stroke-width="1.3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- simple podium base -->
  <rect x="13" y="22.2" width="6" height="2" rx="0.5" fill="#64748b" opacity="0.22"/>
</svg>
